trigger:
  - main
  - develop

variables:
  - name: nodeVersion
    value: '20'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: BuildAndTest
    displayName: 'Build and Test'
    jobs:
      - job: Test
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
          
          - script: npm ci
            displayName: 'Install dependencies'
          
          - script: npm test
            displayName: 'Run Tests'
            continueOnError: true

  - stage: PipelineIQ
    displayName: 'PipelineIQ Analysis'
    dependsOn: BuildAndTest
    condition: failed()
    jobs:
      - job: Analyze
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
          
          - script: npm install -g pipelineiq
            displayName: 'Install PipelineIQ CLI'
          
          - script: |
              pipelineiq analyze \
                --jira-url $(jiraUrl) \
                --jira-email $(jiraEmail) \
                --jira-token $(jiraToken) \
                --jira-project $(jiraProject) \
                --ai-provider gemini \
                --ai-model gemini-2.5-flash-lite \
                --ai-api-key $(aiApiKey) \
                --environment testing \
                --format azure-devops
            displayName: 'Run PipelineIQ Analysis'
            env:
              AI_API_KEY: $(aiApiKey)
